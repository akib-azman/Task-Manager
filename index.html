<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow · Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #0a0809;
  --bg2:          #100d0e;
  --surface:      #161113;
  --surface2:     #1e191b;
  --surface3:     #251f21;
  --border:       rgba(188,139,120,0.1);
  --border2:      rgba(188,139,120,0.22);
  --border3:      rgba(188,139,120,0.4);
  --text:         #f5ede8;
  --text2:        #b89e96;
  --text3:        #6b5550;
  --rose:         #c9977a;
  --rose-light:   #e0b99e;
  --rose-gold:    #b8876a;
  --rose-glow:    rgba(201,151,122,0.15);
  --rose-soft:    rgba(201,151,122,0.1);
  --gold:         #c4a882;
  --gold-soft:    rgba(196,168,130,0.12);
  --cream:        #f5ede8;
  --green:        #7db89a;
  --green-soft:   rgba(125,184,154,0.12);
  --red:          #c97a7a;
  --red-soft:     rgba(201,122,122,0.12);
  --amber:        #c4a065;
  --amber-soft:   rgba(196,160,101,0.12);
  --radius:       16px;
  --radius-sm:    10px;
  --radius-xs:    6px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 1rem 6rem;
  position: relative;
  overflow-x: hidden;
}

/* Atmospheric background */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 900px;
  height: 600px;
  background: radial-gradient(ellipse, rgba(180,110,80,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: 0;
  right: -10%;
  width: 500px;
  height: 500px;
  background: radial-gradient(ellipse, rgba(150,90,70,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Noise overlay */
.noise {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.025;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ─── HEADER ─── */
header {
  width: 100%;
  max-width: 780px;
  margin: 0 auto 2.5rem;
  padding: 2.5rem 0 1.5rem;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  position: relative;
  z-index: 1;
}

header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}

.logo-wrap {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.6rem;
  font-weight: 300;
  letter-spacing: 0.06em;
  color: var(--text);
  line-height: 1;
}
.logo em {
  font-style: italic;
  background: linear-gradient(135deg, var(--rose-light), var(--rose-gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-sub {
  font-size: 0.68rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--text3);
  padding-left: 2px;
}

.header-meta {
  text-align: right;
}
#current-date {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-weight: 400;
  color: var(--text2);
  letter-spacing: 0.02em;
}
#greeting {
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text3);
  margin-top: 0.2rem;
}
.header-quote {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.78rem;
  color: var(--text3);
  margin-top: 0.5rem;
  max-width: 200px;
  text-align: right;
  line-height: 1.5;
}

/* ─── STATS ─── */
.stats {
  width: 100%;
  max-width: 780px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 1.4rem;
  position: relative;
  z-index: 1;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.2rem 1.4rem;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, transform 0.2s;
}
.stat-card:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}

.stat-label {
  font-size: 0.65rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 0.5rem;
}
.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem;
  font-weight: 300;
  line-height: 1;
}
.stat-value.total  { color: var(--text); }
.stat-value.done   { color: var(--green); }
.stat-value.active { color: var(--rose); }
.stat-value.high   { color: var(--red); }

.stat-icon {
  position: absolute;
  bottom: 0.8rem;
  right: 1rem;
  font-size: 1.3rem;
  opacity: 0.15;
}

/* ─── PROGRESS ─── */
.progress-wrap {
  width: 100%;
  max-width: 780px;
  margin-bottom: 1.4rem;
  position: relative;
  z-index: 1;
}
.progress-label {
  font-size: 0.7rem;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#progress-pct {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.95rem;
  color: var(--rose);
  font-style: italic;
}
.progress-bar-bg {
  height: 2px;
  background: var(--surface2);
  border-radius: 10px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--rose-gold), var(--rose-light), var(--gold));
  border-radius: 10px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.progress-bar-fill::after {
  content: '';
  position: absolute;
  right: 0; top: -3px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--rose-light);
  box-shadow: 0 0 8px var(--rose-glow);
}

/* ─── INPUT SECTION ─── */
.input-section {
  width: 100%;
  max-width: 780px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.4rem;
  margin-bottom: 1.2rem;
  position: relative;
  z-index: 1;
  transition: border-color 0.3s;
}
.input-section:focus-within {
  border-color: var(--border2);
}
.input-section::before {
  content: '';
  position: absolute;
  top: 0; left: 1.5rem; right: 1.5rem;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,151,122,0.3), transparent);
}

.section-label {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
}

.input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 0.8rem;
}

.task-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  font-weight: 300;
  padding: 0.8rem 1.1rem;
  outline: none;
  transition: border-color 0.25s, box-shadow 0.25s;
  letter-spacing: 0.01em;
}
.task-input::placeholder { color: var(--text3); font-style: italic; }
.task-input:focus {
  border-color: var(--rose-gold);
  box-shadow: 0 0 0 3px var(--rose-soft);
}

.btn-add {
  background: linear-gradient(135deg, var(--rose-gold), var(--rose));
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 0.8rem 1.5rem;
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.btn-add::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
}
.btn-add:hover { opacity: 0.9; box-shadow: 0 4px 20px rgba(185,120,90,0.35); }
.btn-add:active { transform: scale(0.97); }

.meta-row {
  display: flex;
  gap: 10px;
}

.meta-select, .due-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-family: 'Outfit', sans-serif;
  font-size: 0.83rem;
  padding: 0.6rem 0.9rem;
  outline: none;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.meta-select:focus, .due-input:focus { border-color: var(--rose-gold); }
.due-input { color-scheme: dark; }

/* ─── CONTROLS ─── */
.controls {
  width: 100%;
  max-width: 780px;
  display: flex;
  gap: 10px;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.search-wrap {
  flex: 1;
  min-width: 180px;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 0.9rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 0.8rem;
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  padding: 0.65rem 0.9rem 0.65rem 2.3rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--text3); font-style: italic; }
.search-input:focus { border-color: var(--border2); }

.filter-tabs {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.filter-tab {
  background: transparent;
  border: none;
  color: var(--text3);
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.65rem 1.1rem;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.filter-tab.active {
  background: var(--rose-soft);
  color: var(--rose-light);
}
.filter-tab:hover:not(.active) { color: var(--text2); }

.sort-select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-family: 'Outfit', sans-serif;
  font-size: 0.8rem;
  padding: 0.65rem 0.9rem;
  outline: none;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
}

/* ─── CATEGORY CHIPS ─── */
.cat-row {
  width: 100%;
  max-width: 780px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 1.1rem;
  position: relative;
  z-index: 1;
}
.cat-chip {
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.2s;
}
.cat-chip.active {
  background: var(--rose-soft);
  color: var(--rose-light);
  border-color: var(--border2);
}
.cat-chip:hover:not(.active) { color: var(--text2); border-color: var(--border2); }

/* ─── BULK BAR ─── */
.bulk-bar {
  width: 100%;
  max-width: 780px;
  display: flex;
  gap: 8px;
  margin-bottom: 1rem;
  justify-content: flex-end;
  position: relative;
  z-index: 1;
}
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  color: var(--text3);
  font-family: 'Outfit', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.4rem 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-ghost:hover { background: var(--surface2); color: var(--text2); border-color: var(--border2); }
.btn-ghost.danger:hover { background: var(--red-soft); color: var(--red); border-color: transparent; }

/* ─── TASK LIST ─── */
.task-list {
  width: 100%;
  max-width: 780px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  z-index: 1;
}

.task-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1.3rem;
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
  animation: slideIn 0.25s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  overflow: hidden;
}
.task-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  border-radius: 0;
  background: transparent;
  transition: background 0.2s;
}
.task-item[data-priority="high"]::before   { background: var(--red); }
.task-item[data-priority="medium"]::before { background: var(--amber); }
.task-item[data-priority="low"]::before    { background: var(--green); }

.task-item:hover {
  border-color: var(--border2);
  transform: translateX(2px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}
.task-item.done { opacity: 0.38; }
.task-item.done .task-name { text-decoration: line-through; color: var(--text3); }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Check button */
.check-btn {
  width: 24px;
  height: 24px;
  min-width: 24px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  margin-top: 1px;
  position: relative;
}
.check-btn:hover {
  border-color: var(--rose);
  box-shadow: 0 0 10px var(--rose-soft);
}
.task-item.done .check-btn {
  background: linear-gradient(135deg, var(--rose-gold), var(--rose));
  border-color: transparent;
  box-shadow: 0 0 12px var(--rose-glow);
}
.check-btn svg { display: none; }
.task-item.done .check-btn svg { display: block; }

.task-body { flex: 1; min-width: 0; }

.task-name {
  font-size: 0.93rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 0.35rem;
  word-break: break-word;
  letter-spacing: 0.01em;
  line-height: 1.4;
}

.task-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.badge {
  font-size: 0.62rem;
  font-weight: 500;
  padding: 2px 9px;
  border-radius: 100px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.badge-high   { background: var(--red-soft);   color: var(--red); }
.badge-medium { background: var(--amber-soft);  color: var(--amber); }
.badge-low    { background: var(--green-soft);  color: var(--green); }
.badge-cat    { background: rgba(201,151,122,0.08); color: var(--rose); border: 1px solid var(--border); }

.task-due {
  font-size: 0.7rem;
  color: var(--text3);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.8rem;
}
.task-due.overdue { color: var(--red); }
.task-due.today   { color: var(--amber); }

.task-actions {
  display: flex;
  gap: 4px;
  align-items: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.task-item:hover .task-actions { opacity: 1; }

.action-btn {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  transition: all 0.15s;
}
.action-btn:hover { background: var(--surface2); color: var(--rose-light); border-color: var(--border2); }
.action-btn.del:hover { background: var(--red-soft); color: var(--red); border-color: transparent; }

/* ─── EDIT INPUT ─── */
.edit-input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--rose-gold);
  border-radius: var(--radius-xs);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.93rem;
  padding: 0.3rem 0.7rem;
  outline: none;
  margin-bottom: 0.3rem;
  box-shadow: 0 0 0 3px var(--rose-soft);
}

/* ─── EMPTY STATE ─── */
.empty-state {
  width: 100%;
  max-width: 780px;
  padding: 5rem 2rem;
  text-align: center;
  color: var(--text3);
}
.empty-icon {
  font-size: 2.5rem;
  margin-bottom: 1.2rem;
  opacity: 0.2;
}
.empty-state h3 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 1.4rem;
  color: var(--text2);
  margin-bottom: 0.4rem;
  letter-spacing: 0.02em;
}
.empty-state p { font-size: 0.83rem; font-style: italic; }

/* ─── TOAST ─── */
#toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  padding: 0.6rem 1.4rem;
  border-radius: 100px;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── FOOTER ─── */
footer {
  width: 100%;
  max-width: 780px;
  margin-top: 4rem;
  padding-top: 1.5rem;
  position: relative;
  z-index: 1;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
}
footer::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}
.footer-ornament {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  color: var(--text3);
  opacity: 0.4;
  letter-spacing: 0.5rem;
  margin-bottom: 0.2rem;
}
.footer-credit {
  font-size: 0.68rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text3);
}
.footer-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 400;
  font-style: italic;
  background: linear-gradient(135deg, var(--rose-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.06em;
}
.footer-tagline {
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text3);
  opacity: 0.5;
}

/* ─── KEYBOARD SHORTCUT HINT ─── */
.kbd-hint {
  font-size: 0.62rem;
  color: var(--text3);
  letter-spacing: 0.1em;
  margin-top: -0.4rem;
  margin-bottom: 0.5rem;
  padding-left: 2px;
}
kbd {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 0.6rem;
  font-family: 'Outfit', sans-serif;
  color: var(--text3);
}

/* ─── RESPONSIVE ─── */
@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .meta-row { flex-direction: column; }
  .filter-tab { padding: 0.6rem 0.7rem; font-size: 0.72rem; }
}
</style>
</head>
<body>

<div class="noise"></div>

<header>
  <div class="logo-wrap">
    <div class="logo">Task<em>Flow</em></div>
    <div class="logo-sub">Task Manager</div>
  </div>
  <div class="header-meta">
    <div id="current-date"></div>
    <div id="greeting"></div>
    <div class="header-quote" id="header-quote"></div>
  </div>
</header>

<!-- STATS -->
<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Total</div>
    <div class="stat-value total" id="stat-total">0</div>
    <div class="stat-icon">◈</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Completed</div>
    <div class="stat-value done" id="stat-done">0</div>
    <div class="stat-icon">✓</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Active</div>
    <div class="stat-value active" id="stat-active">0</div>
    <div class="stat-icon">◇</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">High Priority</div>
    <div class="stat-value high" id="stat-high">0</div>
    <div class="stat-icon">!</div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-label">
    <span>Overall Progress</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<!-- INPUT -->
<div class="input-section">
  <div class="section-label">New Task</div>
  <div class="input-row">
    <input class="task-input" id="task-input" type="text" placeholder="What needs to be accomplished?" />
    <button class="btn-add" onclick="addTask()">+ Add</button>
  </div>
  <div class="kbd-hint"><kbd>Enter</kbd> to add quickly</div>
  <div class="meta-row">
    <select class="meta-select" id="priority-select">
      <option value="medium">◈ Medium priority</option>
      <option value="high">▲ High priority</option>
      <option value="low">▽ Low priority</option>
    </select>
    <select class="meta-select" id="category-select">
      <option value="General">General</option>
      <option value="Work">Work</option>
      <option value="Study">Study</option>
      <option value="Personal">Personal</option>
      <option value="Health">Health</option>
      <option value="Finance">Finance</option>
    </select>
    <input class="due-input" type="date" id="due-input" title="Due date" />
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search-input" type="text" placeholder="Search your tasks…" oninput="render()" />
  </div>
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
    <button class="filter-tab" onclick="setFilter('active', this)">Active</button>
    <button class="filter-tab" onclick="setFilter('done', this)">Done</button>
  </div>
  <select class="sort-select" id="sort-select" onchange="render()">
    <option value="newest">↓ Newest</option>
    <option value="oldest">↑ Oldest</option>
    <option value="priority">Priority</option>
    <option value="due">Due date</option>
    <option value="alpha">A–Z</option>
  </select>
</div>

<div class="cat-row" id="cat-row"></div>

<div class="bulk-bar">
  <button class="btn-ghost" onclick="markAllDone()">✓ Complete all</button>
  <button class="btn-ghost danger" onclick="clearDone()">✕ Clear completed</button>
</div>

<div class="task-list" id="task-list"></div>

<div id="toast"></div>

<!-- FOOTER -->
<footer>
  <div class="footer-ornament">— ✦ —</div>
  <div class="footer-credit">Crafted by</div>
  <div class="footer-name">Akib Azman</div>
  <div class="footer-tagline">TaskFlow</div>
</footer>

<script>
let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
let filter = 'all';
let activeCat = 'All';

const QUOTES = [
  '"Excellence is not a skill — it is an attitude."',
  '"The secret of getting ahead is getting started."',
  '"Small deeds done are better than great deeds planned."',
  '"Discipline is the bridge between goals and accomplishment."',
  '"Focus on being productive instead of busy."',
];

function save() {
  localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function addTask() {
  const input = document.getElementById('task-input');
  const name = input.value.trim();
  if (!name) { input.focus(); input.style.borderColor = 'var(--red)'; setTimeout(()=>input.style.borderColor='',800); return; }

  const task = {
    id: Date.now(),
    name,
    done: false,
    priority: document.getElementById('priority-select').value,
    category: document.getElementById('category-select').value,
    due: document.getElementById('due-input').value,
    created: Date.now()
  };

  tasks.unshift(task);
  save();
  input.value = '';
  document.getElementById('due-input').value = '';
  render();
  toast('Task added');
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  save(); render();
  toast(t.done ? '✦ Task completed' : 'Task marked active');
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
  toast('Task removed');
}

function startEdit(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const el = document.getElementById('name-' + id);
  const orig = el.textContent;
  el.innerHTML = `<input class="edit-input" id="edit-${id}" value="${orig.replace(/"/g,'&quot;')}" />`;
  const inp = document.getElementById('edit-' + id);
  inp.focus(); inp.select();
  inp.addEventListener('blur', () => finishEdit(id, inp.value));
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') inp.blur();
    if (e.key === 'Escape') render();
  });
}

function finishEdit(id, val) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const v = val.trim();
  if (v) { t.name = v; save(); toast('Task updated'); }
  render();
}

function markAllDone() {
  tasks.forEach(t => t.done = true);
  save(); render(); toast('All tasks completed');
}

function clearDone() {
  const count = tasks.filter(t => t.done).length;
  if (!count) { toast('No completed tasks'); return; }
  tasks = tasks.filter(t => !t.done);
  save(); render(); toast(`Cleared ${count} task${count > 1 ? 's' : ''}`);
}

function getDueMeta(due) {
  if (!due) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(due + 'T00:00:00');
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0)  return { label: 'Overdue · ' + Math.abs(diff) + 'd', cls: 'overdue' };
  if (diff === 0) return { label: 'Due today', cls: 'today' };
  if (diff === 1) return { label: 'Due tomorrow', cls: '' };
  return { label: d.toLocaleDateString('en-GB', { day:'numeric', month:'long' }), cls: '' };
}

const PRIO = { high: 3, medium: 2, low: 1 };

function render() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const sortBy = document.getElementById('sort-select').value;

  const allCats = ['All', ...new Set(tasks.map(t => t.category))];
  const catRow = document.getElementById('cat-row');
  catRow.innerHTML = allCats.map(c =>
    `<button class="cat-chip ${c === activeCat ? 'active' : ''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');

  let list = tasks.filter(t => {
    if (filter === 'active' && t.done) return false;
    if (filter === 'done'   && !t.done) return false;
    if (activeCat !== 'All' && t.category !== activeCat) return false;
    if (search && !t.name.toLowerCase().includes(search)) return false;
    return true;
  });

  if (sortBy === 'oldest')   list.sort((a,b) => a.created - b.created);
  else if (sortBy === 'priority') list.sort((a,b) => PRIO[b.priority] - PRIO[a.priority]);
  else if (sortBy === 'due') list.sort((a,b) => {
    if (!a.due && !b.due) return 0;
    if (!a.due) return 1; if (!b.due) return -1;
    return a.due.localeCompare(b.due);
  });
  else if (sortBy === 'alpha') list.sort((a,b) => a.name.localeCompare(b.name));
  else list.sort((a,b) => b.created - a.created);

  const total  = tasks.length;
  const done   = tasks.filter(t => t.done).length;
  const active = total - done;
  const high   = tasks.filter(t => t.priority === 'high' && !t.done).length;
  document.getElementById('stat-total').textContent  = total;
  document.getElementById('stat-done').textContent   = done;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-high').textContent   = high;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  const container = document.getElementById('task-list');
  if (!list.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">◈</div>
        <h3>${search ? 'No matching tasks' : filter === 'done' ? 'No completed tasks yet' : 'Your canvas is clear'}</h3>
        <p>${search ? 'Try a different search term.' : 'Add your first task above to begin.'}</p>
      </div>`;
    return;
  }

  container.innerHTML = list.map(t => {
    const due = getDueMeta(t.due);
    return `
    <div class="task-item ${t.done ? 'done' : ''}" data-priority="${t.priority}" data-id="${t.id}">
      <button class="check-btn" onclick="toggleDone(${t.id})" title="${t.done ? 'Mark active' : 'Mark complete'}">
        <svg width="10" height="7" viewBox="0 0 10 7" fill="none">
          <path d="M1 3.5L3.5 6L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="task-body">
        <div class="task-name" id="name-${t.id}">${escHtml(t.name)}</div>
        <div class="task-meta">
          <span class="badge badge-${t.priority}">${t.priority}</span>
          <span class="badge badge-cat">${escHtml(t.category)}</span>
          ${due ? `<span class="task-due ${due.cls}">${due.label}</span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="action-btn" onclick="startEdit(${t.id})" title="Edit">✎</button>
        <button class="action-btn del" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>
    </div>`;
  }).join('');
}

function setCat(cat) { activeCat = cat; render(); }

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initMeta() {
  const now = new Date();
  document.getElementById('current-date').textContent =
    now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  const h = now.getHours();
  document.getElementById('greeting').textContent =
    h < 5 ? 'Late night' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
  document.getElementById('header-quote').textContent =
    QUOTES[Math.floor(Math.random() * QUOTES.length)];
}

document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// Global keyboard shortcut: / to focus search
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
});

initMeta();
render();
</script>
</body>
</html>
