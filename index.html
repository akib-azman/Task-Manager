<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #222228;
    --surface3: #2a2a32;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0eff5;
    --text2: #9b9aaa;
    --text3: #5f5e70;
    --accent: #7c6af5;
    --accent-glow: rgba(124,106,245,0.25);
    --accent-soft: rgba(124,106,245,0.12);
    --green: #22c983;
    --green-soft: rgba(34,201,131,0.12);
    --red: #f05;
    --red-soft: rgba(255,0,85,0.1);
    --amber: #f5a623;
    --amber-soft: rgba(245,166,35,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }
 

  header {
    width: 100%;
    max-width: 720px;
    margin-bottom: 2.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
 
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
 
  .header-meta {
    font-size: 0.8rem;
    color: var(--text3);
    text-align: right;
    line-height: 1.6;
  }
  #current-date { color: var(--text2); font-weight: 500; }
 
  .stats {
    width: 100%;
    max-width: 720px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
  }
  .stat-label {
    font-size: 0.72rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.4rem;
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.7rem;
    font-weight: 700;
    line-height: 1;
  }
  .stat-value.total  { color: var(--text); }
  .stat-value.done   { color: var(--green); }
  .stat-value.active { color: var(--accent); }
  .stat-value.high   { color: var(--red); }
 
  .input-section {
    width: 100%;
    max-width: 720px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.2rem;
    margin-bottom: 1.2rem;
  }
 
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 0.8rem;
  }
 
  .task-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 0.7rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .task-input::placeholder { color: var(--text3); }
  .task-input:focus { border-color: var(--accent); }
 
  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0.7rem 1.4rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.88; }
  .btn-add:active { transform: scale(0.97); }
 
  .meta-row {
    display: flex;
    gap: 10px;
  }
 
  .meta-select {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 0.5rem 0.8rem;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }
  .meta-select:focus { border-color: var(--accent); }
 
  .due-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 0.5rem 0.8rem;
    outline: none;
    color-scheme: dark;
  }
  .due-input:focus { border-color: var(--accent); }
 
  .controls {
    width: 100%;
    max-width: 720px;
    display: flex;
    gap: 10px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
 
  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 0.85rem;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    padding: 0.6rem 0.8rem 0.6rem 2.2rem;
    outline: none;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--border2); }
 
  .filter-tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .filter-tab {
    background: transparent;
    border: none;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .filter-tab.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 500;
  }
  .filter-tab:hover:not(.active) { color: var(--text2); }
 
  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    padding: 0.6rem 0.8rem;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }
 
  .task-list {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
 
  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    transition: border-color 0.2s, opacity 0.2s;
    animation: slideIn 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0;
    background: transparent;
    transition: background 0.2s;
  }
  .task-item[data-priority="high"]::before { background: var(--red); }
  .task-item[data-priority="medium"]::before { background: var(--amber); }
  .task-item[data-priority="low"]::before { background: var(--green); }
 
  .task-item:hover { border-color: var(--border2); }
  .task-item.done { opacity: 0.45; }
  .task-item.done .task-name { text-decoration: line-through; color: var(--text3); }
 
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
 
  .check-btn {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    margin-top: 1px;
  }
  .check-btn:hover { border-color: var(--green); }
  .task-item.done .check-btn {
    background: var(--green);
    border-color: var(--green);
  }
  .check-btn svg { display: none; }
  .task-item.done .check-btn svg { display: block; }
 
  .task-body { flex: 1; min-width: 0; }
 
  .task-name {
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.3rem;
    word-break: break-word;
  }
 
  .task-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
 
  .badge {
    font-size: 0.7rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-high   { background: var(--red-soft);   color: #ff5580; }
  .badge-medium { background: var(--amber-soft);  color: var(--amber); }
  .badge-low    { background: var(--green-soft);  color: var(--green); }
  .badge-cat    { background: var(--surface3); color: var(--text2); }
 
  .task-due {
    font-size: 0.75rem;
    color: var(--text3);
  }
  .task-due.overdue { color: #ff5580; }
  .task-due.today   { color: var(--amber); }
 
  .task-actions {
    display: flex;
    gap: 4px;
    align-items: center;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .task-item:hover .task-actions { opacity: 1; }
 
  .action-btn {
    width: 30px;
    height: 30px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    transition: background 0.15s, color 0.15s;
  }
  .action-btn:hover { background: var(--surface2); color: var(--text); }
  .action-btn.del:hover { background: var(--red-soft); color: #ff5580; border-color: transparent; }
 
  .empty-state {
    width: 100%;
    max-width: 720px;
    padding: 4rem 2rem;
    text-align: center;
    color: var(--text3);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.3; }
  .empty-state h3 { font-family: 'Syne', sans-serif; font-weight: 600; color: var(--text2); margin-bottom: 0.4rem; }
  .empty-state p  { font-size: 0.875rem; }
 
  .bulk-bar {
    width: 100%;
    max-width: 720px;
    display: flex;
    gap: 10px;
    margin-bottom: 1rem;
    justify-content: flex-end;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.45rem 0.9rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-ghost.danger:hover { background: var(--red-soft); color: #ff5580; border-color: transparent; }
 
  .progress-wrap {
    width: 100%;
    max-width: 720px;
    margin-bottom: 1rem;
  }
  .progress-bar-bg {
    height: 3px;
    background: var(--surface2);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 10px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 0.75rem;
    color: var(--text3);
    margin-bottom: 0.3rem;
    display: flex;
    justify-content: space-between;
  }
 
  .edit-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 0.3rem 0.6rem;
    outline: none;
    margin-bottom: 0.3rem;
  }
 
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 0.85rem;
    padding: 0.6rem 1.2rem;
    border-radius: 100px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
 
  .cat-row {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1rem;
  }
  .cat-chip {
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .cat-chip.active { background: var(--surface3); color: var(--text); border-color: var(--border2); }
  .cat-chip:hover:not(.active) { color: var(--text2); }
</style>
</head>
<body>
 
<header>
  <div class="logo">Task<span>Flow</span></div>
  <div class="header-meta">
    <div id="current-date"></div>
    <div id="greeting"></div>
  </div>
</header>
 
<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Total</div>
    <div class="stat-value total" id="stat-total">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Completed</div>
    <div class="stat-value done" id="stat-done">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Active</div>
    <div class="stat-value active" id="stat-active">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">High Priority</div>
    <div class="stat-value high" id="stat-high">0</div>
  </div>
</div>
 
<div class="progress-wrap">
  <div class="progress-label">
    <span>Overall Progress</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>
 
<div class="input-section">
  <div class="input-row">
    <input class="task-input" id="task-input" type="text" placeholder="What needs to be done?" />
    <button class="btn-add" onclick="addTask()">+ Add Task</button>
  </div>
  <div class="meta-row">
    <select class="meta-select" id="priority-select">
      <option value="medium">🟡 Medium priority</option>
      <option value="high">🔴 High priority</option>
      <option value="low">🟢 Low priority</option>
    </select>
    <select class="meta-select" id="category-select">
      <option value="General">📁 General</option>
      <option value="Work">💼 Work</option>
      <option value="Study">📚 Study</option>
      <option value="Personal">🧍 Personal</option>
      <option value="Health">❤️ Health</option>
      <option value="Finance">💰 Finance</option>
    </select>
    <input class="due-input" type="date" id="due-input" title="Due date" />
  </div>
</div>
 
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="Search tasks..." oninput="render()" />
  </div>
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
    <button class="filter-tab" onclick="setFilter('active', this)">Active</button>
    <button class="filter-tab" onclick="setFilter('done', this)">Done</button>
  </div>
  <select class="sort-select" id="sort-select" onchange="render()">
    <option value="newest">↓ Newest</option>
    <option value="oldest">↑ Oldest</option>
    <option value="priority">🔥 Priority</option>
    <option value="due">📅 Due date</option>
    <option value="alpha">A–Z</option>
  </select>
</div>
 
<div class="cat-row" id="cat-row"></div>
 

<div class="bulk-bar">
  <button class="btn-ghost" onclick="markAllDone()">✓ Complete all</button>
  <button class="btn-ghost danger" onclick="clearDone()">✕ Clear completed</button>
</div>
 
<div class="task-list" id="task-list"></div>
 
<div id="toast"></div>
 
<script>
let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
let filter = 'all';
let activeCat = 'All';
 
function save() {
  localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
}
 
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
 
function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
 
function addTask() {
  const input = document.getElementById('task-input');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
 
  const task = {
    id: Date.now(),
    name,
    done: false,
    priority: document.getElementById('priority-select').value,
    category: document.getElementById('category-select').value,
    due: document.getElementById('due-input').value,
    created: Date.now()
  };
 
  tasks.unshift(task);
  save();
  input.value = '';
  document.getElementById('due-input').value = '';
  render();
  toast('Task added!');
}
 
function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  save();
  render();
  toast(t.done ? '✓ Task completed!' : 'Task marked active');
}
 
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
  toast('Task deleted');
}
 
function startEdit(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const el = document.getElementById('name-' + id);
  const orig = el.textContent;
  el.innerHTML = `<input class="edit-input" id="edit-${id}" value="${orig.replace(/"/g, '&quot;')}" />`;
  const inp = document.getElementById('edit-' + id);
  inp.focus();
  inp.select();
  inp.addEventListener('blur', () => finishEdit(id, inp.value));
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') inp.blur();
    if (e.key === 'Escape') { inp.removeEventListener('blur', () => {}); render(); }
  });
}
 
function finishEdit(id, val) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const v = val.trim();
  if (v) { t.name = v; save(); toast('Task updated'); }
  render();
}
 
function markAllDone() {
  tasks.forEach(t => t.done = true);
  save(); render(); toast('All tasks completed!');
}
 
function clearDone() {
  const count = tasks.filter(t => t.done).length;
  if (!count) { toast('No completed tasks'); return; }
  tasks = tasks.filter(t => !t.done);
  save(); render(); toast(`Cleared ${count} completed task${count > 1 ? 's' : ''}`);
}
 
function getDueMeta(due) {
  if (!due) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(due + 'T00:00:00');
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0)  return { label: 'Overdue by ' + Math.abs(diff) + 'd', cls: 'overdue' };
  if (diff === 0) return { label: 'Due today', cls: 'today' };
  if (diff === 1) return { label: 'Due tomorrow', cls: '' };
  return { label: 'Due ' + d.toLocaleDateString('en-GB', { day:'numeric', month:'short' }), cls: '' };
}
 
const PRIO = { high: 3, medium: 2, low: 1 };
 
function render() {
  const search  = document.getElementById('search-input').value.toLowerCase();
  const sortBy  = document.getElementById('sort-select').value;
 

  const allCats = ['All', ...new Set(tasks.map(t => t.category))];
  const catRow = document.getElementById('cat-row');
  catRow.innerHTML = allCats.map(c =>
    `<button class="cat-chip ${c === activeCat ? 'active' : ''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
 
  let list = tasks.filter(t => {
    if (filter === 'active' && t.done) return false;
    if (filter === 'done'   && !t.done) return false;
    if (activeCat !== 'All' && t.category !== activeCat) return false;
    if (search && !t.name.toLowerCase().includes(search)) return false;
    return true;
  });
 
  if (sortBy === 'oldest')  list.sort((a,b) => a.created - b.created);
  else if (sortBy === 'priority') list.sort((a,b) => PRIO[b.priority] - PRIO[a.priority]);
  else if (sortBy === 'due') list.sort((a,b) => {
    if (!a.due && !b.due) return 0;
    if (!a.due) return 1;
    if (!b.due) return -1;
    return a.due.localeCompare(b.due);
  });
  else if (sortBy === 'alpha') list.sort((a,b) => a.name.localeCompare(b.name));
  else list.sort((a,b) => b.created - a.created);
 
  const total  = tasks.length;
  const done   = tasks.filter(t => t.done).length;
  const active = total - done;
  const high   = tasks.filter(t => t.priority === 'high' && !t.done).length;
  document.getElementById('stat-total').textContent  = total;
  document.getElementById('stat-done').textContent   = done;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-high').textContent   = high;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
 
  const container = document.getElementById('task-list');
  if (!list.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <h3>${search ? 'No matching tasks' : filter === 'done' ? 'No completed tasks yet' : 'Nothing here yet'}</h3>
        <p>${search ? 'Try a different search term.' : 'Add your first task above to get started.'}</p>
      </div>`;
    return;
  }
 
  container.innerHTML = list.map(t => {
    const due = getDueMeta(t.due);
    return `
    <div class="task-item ${t.done ? 'done' : ''}" data-priority="${t.priority}" data-id="${t.id}">
      <button class="check-btn" onclick="toggleDone(${t.id})" title="${t.done ? 'Mark active' : 'Mark complete'}">
        <svg width="11" height="8" viewBox="0 0 11 8" fill="none">
          <path d="M1 4L4 7L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="task-body">
        <div class="task-name" id="name-${t.id}">${escHtml(t.name)}</div>
        <div class="task-meta">
          <span class="badge badge-${t.priority}">${t.priority}</span>
          <span class="badge badge-cat">${escHtml(t.category)}</span>
          ${due ? `<span class="task-due ${due.cls}">${due.label}</span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="action-btn" onclick="startEdit(${t.id})" title="Edit">✎</button>
        <button class="action-btn del" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>
    </div>`;
  }).join('');
}
 
function setCat(cat) {
  activeCat = cat;
  render();
}
 
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
 
function initMeta() {
  const now = new Date();
  document.getElementById('current-date').textContent = now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
  const h = now.getHours();
  document.getElementById('greeting').textContent = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
}
 
document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});
 
initMeta();
render();
</script>
</body>
</html>
